<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blocked — Doomscroll Blocker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f11;
      color: #e2e2e5;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }

    .icon {
      font-size: 3.5rem;
      line-height: 1;
      user-select: none;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .site {
      font-size: 1rem;
      color: #888;
      font-family: ui-monospace, monospace;
      background: #1c1c1f;
      border: 1px solid #2e2e33;
      border-radius: 6px;
      padding: 0.35em 0.75em;
    }

    p {
      font-size: 1rem;
      color: #999;
      max-width: 36ch;
      line-height: 1.6;
    }

  </style>
</head>
<body>
  <div class="icon">🚫</div>
  <h1>Doomscroll blocked</h1>
  <span class="site" id="site">this site</span>
  <p>You blocked this feed to stay focused. There's nothing here worth losing your time over.</p>
  <script src="blocked.js"></script>
</body>
</html>
